<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8f9fa" stroke="#dee2e6" stroke-width="2"/>
  
  <!-- Book -->
  <rect x="100" y="80" width="120" height="160" fill="#6c757d" stroke="#495057" stroke-width="2"/>
  <rect x="110" y="90" width="100" height="140" fill="#ffffff" stroke="#dee2e6" stroke-width="1"/>
  
  <!-- Book pages -->
  <line x1="110" y1="110" x2="210" y2="110" stroke="#dee2e6" stroke-width="1"/>
  <line x1="110" y1="130" x2="210" y2="130" stroke="#dee2e6" stroke-width="1"/>
  <line x1="110" y1="150" x2="210" y2="150" stroke="#dee2e6" stroke-width="1"/>
  <line x1="110" y1="170" x2="210" y2="170" stroke="#dee2e6" stroke-width="1"/>
  <line x1="110" y1="190" x2="210" y2="190" stroke="#dee2e6" stroke-width="1"/>
  <line x1="110" y1="210" x2="210" y2="210" stroke="#dee2e6" stroke-width="1"/>
  
  <!-- QR Code representation -->
  <rect x="250" y="100" width="80" height="80" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <rect x="260" y="110" width="8" height="8" fill="#000000"/>
  <rect x="280" y="110" width="8" height="8" fill="#000000"/>
  <rect x="300" y="110" width="8" height="8" fill="#000000"/>
  <rect x="260" y="130" width="8" height="8" fill="#000000"/>
  <rect x="300" y="130" width="8" height="8" fill="#000000"/>
  <rect x="260" y="150" width="8" height="8" fill="#000000"/>
  <rect x="280" y="150" width="8" height="8" fill="#000000"/>
  <rect x="300" y="150" width="8" height="8" fill="#000000"/>
  <rect x="260" y="170" width="8" height="8" fill="#000000"/>
  <rect x="300" y="170" width="8" height="8" fill="#000000"/>
  <rect x="260" y="190" width="8" height="8" fill="#000000"/>
  <rect x="280" y="190" width="8" height="8" fill="#000000"/>
  <rect x="300" y="190" width="8" height="8" fill="#000000"/>
  
  <!-- Title -->
  <text x="200" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#495057">QR Book Project</text>
  
  <!-- Subtitle -->
  <text x="200" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#6c757d">Bridging Physical &amp; Digital</text>
</svg> 